services:
  # ── OpenClaw Gateway ───────────────────────────────────────────────────
  # The main process — runs the orchestrator and spawns sub-agents
  srr-gateway:
    build: .
    container_name: srr-agents-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # Mount the entire .openclaw dir so atomic renames work
      - ./config:/home/node/.openclaw:rw
      # Skills inside .openclaw
      - ./skills:/home/node/.openclaw/skills:rw
      # Workspace: the ONLY host directory agents can touch
      - ./workspace:/home/node/workspace:rw
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── CLI utility ────────────────────────────────────────────────────────
  # For running one-off commands: docker compose run --rm srr-cli <command>
  srr-cli:
    build: .
    container_name: srr-agents-cli
    network_mode: "service:srr-gateway"
    volumes:
      - ./config:/home/node/.openclaw:rw
      - ./skills:/home/node/.openclaw/skills:rw
      - ./workspace:/home/node/workspace:rw
    env_file:
      - .env
    profiles:
      - cli
    entrypoint: ["openclaw"]
